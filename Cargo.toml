[package]
name = "kmw-fb-rust"
version = "0.1.0"
edition = "2021"
authors = ["Kasifrasi <dev@kasifrasi.example>"]
description = "Rust rewrite of the KMW Finanzbericht exporter using rust_xlsxwriter"
license = "GPL-3.0-or-later"

[lib]
name = "kmw_fb_rust"
crate-type = ["rlib"]

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0.17"
rust_xlsxwriter = "0.92.2"
chrono = { version = "0.4", features = ["serde"] }
regex = "1.11"
log = "0.4"
once_cell = "1.19"
calamine = "0.32.0"

[dev-dependencies]
tempfile = "3"
