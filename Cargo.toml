[package]
name = "kmw-fb-rust"
version = "0.1.0"
edition = "2021"
authors = ["Kasifrasi <dev@kasifrasi.example>"]
description = "Rust rewrite of the KMW Finanzbericht exporter using rust_xlsxwriter"
license = "GPL-3.0-or-later"

[lib]
crate-type = ["rlib"]
name = "kmw_fb_rust"

[dependencies]
anyhow = "1.0"
calamine = "0.32.0"
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
once_cell = "1.19"
regex = "1.11"
rust_xlsxwriter = "0.92.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0.17"

[dev-dependencies]
tempfile = "3"
